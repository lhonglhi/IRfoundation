<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Protected Page — Intelligent Racing Foundation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
  <link rel="apple-touch-icon" href="images/webclip.png">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .password-form {
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 16px;
    }
    .password-form input[type="password"] {
      width: 100%;
      padding: 14px 18px;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border-medium);
      background: var(--color-bg-card);
      color: var(--color-text-primary);
      font-size: 16px;
      font-family: var(--font-sans);
      outline: none;
      transition: border-color var(--transition-base);
    }
    .password-form input[type="password"]:focus { border-color: var(--color-primary); }
    .password-form input[type="submit"] { font-family: var(--font-sans); }
    .password-error {
      display: none;
      color: var(--color-primary);
      font-size: 14px;
    }
    .password-error.show { display: block; }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-code">401</div>
    <h1 class="section-title">Protected Page</h1>
    <p class="error-message">Enter the password to continue.</p>
    <form class="password-form" action="/.wf_auth" method="post" id="email-form" name="email-form">
      <input type="password" name="pass" placeholder="Enter your password" autofocus maxlength="256" required>
      <input type="submit" class="btn btn-primary" value="Submit">
      <div class="password-error" id="pwError">Incorrect password. Please try again.</div>
      <input type="hidden" name="path" value="<%WF_FORM_VALUE_PATH%>">
      <input type="hidden" name="page" value="<%WF_FORM_VALUE_PAGE%>">
    </form>
  </main>
  <script>
    if (/[?&]e=1(&|$)/.test(document.location.search)) {
      document.getElementById('pwError').classList.add('show');
    }
  </script>
</body>
</html>
